<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hoenn Grand Mapper</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .toolbar { background: #2d2d2d; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #444; }
        .canvas-container { background: #111; padding: 10px; border-radius: 8px; overflow: auto; max-width: 95vw; max-height: 75vh; border: 2px solid #333; box-shadow: inset 0 0 10px #000; }
        canvas { background: white; cursor: crosshair; image-rendering: pixelated; display: block; }
        .palette { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; background: #2d2d2d; padding: 12px; border-radius: 10px; width: 100%; max-width: 900px; border: 1px solid #444; }
        .texture-btn { border: 2px solid #444; cursor: pointer; background: #3d3d3d; padding: 4px; border-radius: 6px; transition: 0.1s; position: relative; }
        .texture-btn:hover { border-color: #666; }
        .texture-btn.selected { border-color: #00ff00; background: #1a1a1a; box-shadow: 0 0 8px rgba(0,255,0,0.3); }
        .texture-btn img { display: block; width: 40px; height: 40px; object-fit: contain; image-rendering: pixelated; }
        button { padding: 8px 16px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 4px; font-weight: 600; }
        button:hover { background: #2980b9; }
        .btn-success { background: #27ae60; }
        .btn-success:hover { background: #219150; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; font-weight: bold; }
        select, input[type="number"], input[type="file"] { padding: 6px; border-radius: 4px; border: 1px solid #444; background: #3d3d3d; color: white; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; background: #3d3d3d; padding: 6px 12px; border-radius: 4px; border: 1px solid #444; }
    </style>
</head>
<body>

    <h2 style="margin-top:0; color: #3498db;">Hoenn Grand Mapper</h2>

    <div class="toolbar">
        <div class="input-group">
            <label>Dimensions</label>
            <div style="display:flex; gap:5px; align-items:center;">
                <input type="number" id="widthInput" value="2048" style="width: 70px;"> x 
                <input type="number" id="heightInput" value="2048" style="width: 70px;">
            </div>
        </div>

        <div class="input-group">
            <label>Background Color</label>
            <input type="color" id="bgColor" value="#78c060">
        </div>

        <div class="input-group">
            <label>BG Tile (Repeat)</label>
            <input type="file" id="bgFileInput" accept="image/*">
        </div>

        <button onclick="fillBackground()">Apply BG</button>

        <div class="input-group">
            <label>Paint Tool</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="input-group">
            <label>Brush Size</label>
            <select id="brushSize">
                <option value="1">1x1 Case</option>
                <option value="3">3x3 Cases</option>
                <option value="5">5x5 Cases</option>
            </select>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="gridSnap" checked>
            <label for="gridSnap" style="color:white; margin:0;">Grid Snap</label>
        </div>

        <button class="btn-success" onclick="exportImage()">Export PNG</button>
    </div>

    <div class="palette" id="palette">
        <span style="width:100%; font-size: 11px; color:#888; margin-bottom:5px;">ASSET PALETTE:</span>
    </div>

    <div class="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const palette = document.getElementById('palette');
        const gridSnap = document.getElementById('gridSnap');
        const brushSize = document.getElementById('brushSize');
        let selectedTexture = null;
        let isDrawing = false;
        let bgPatternImage = null;

        function setupCanvas() {
            const oldData = canvas.toDataURL();
            canvas.width = document.getElementById('widthInput').value;
            canvas.height = document.getElementById('heightInput').value;
            ctx.imageSmoothingEnabled = false;
            
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = oldData;
            fillBackground(); // Start with background
        }

        document.getElementById('widthInput').onchange = setupCanvas;
        document.getElementById('heightInput').onchange = setupCanvas;

        function fillBackground() {
            if (bgPatternImage) {
                const pattern = ctx.createPattern(bgPatternImage, 'repeat');
                ctx.fillStyle = pattern;
            } else {
                ctx.fillStyle = document.getElementById('bgColor').value;
            }
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Handle Background Tile Upload
        document.getElementById('bgFileInput').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => { bgPatternImage = img; fillBackground(); };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        // Handle Paint Texture Upload
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => createPaletteItem(img);
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        function createPaletteItem(img) {
            const btn = document.createElement('div');
            btn.className = 'texture-btn';
            btn.appendChild(img.cloneNode());
            btn.onclick = () => {
                document.querySelectorAll('.texture-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedTexture = img;
            };
            palette.appendChild(btn);
            btn.click();
        }

        function draw(e) {
            if (!isDrawing || !selectedTexture) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const rawX = (e.clientX - rect.left) * scaleX;
            const rawY = (e.clientY - rect.top) * scaleY;

            const size = parseInt(brushSize.value);
            const halfSize = Math.floor(size / 2);
            const tW = selectedTexture.width;
            const tH = selectedTexture.height;

            for (let i = -halfSize; i <= halfSize; i++) {
                for (let j = -halfSize; j <= halfSize; j++) {
                    let drawX, drawY;

                    if (gridSnap.checked) {
                        const centerX = Math.floor(rawX / tW) * tW;
                        const centerY = Math.floor(rawY / tH) * tH;
                        drawX = centerX + (i * tW);
                        drawY = centerY + (j * tH);
                    } else {
                        drawX = (rawX - tW/2) + (i * tW);
                        drawY = (rawY - tH/2) + (j * tH);
                    }
                    ctx.drawImage(selectedTexture, drawX, drawY);
                }
            }
        }

        canvas.onmousedown = (e) => { isDrawing = true; draw(e); };
        window.onmouseup = () => isDrawing = false;
        canvas.onmousemove = draw;
        setupCanvas();

        function exportImage() {
            const link = document.createElement('a');
            link.download = 'Hoenn_Texture_Map.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        }
    </script>
</body>
</html>
